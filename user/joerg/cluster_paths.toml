# Cluster-specific path mappings for datasets, tokenizers, and base configurations
#
# SETUP INSTRUCTIONS:
# 1. Copy this file to user/<your_username>/cluster_paths.toml
# 2. Replace all <YOUR_*> placeholders with your actual paths
# 3. Add/remove clusters and datasets as needed for your setup
#
# Structure:
#   - ["cluster.{name}"]                          - Cache directories and output paths
#   - ["tokenizer.{name}.{cluster}"]              - Tokenizer paths
#   - ["dataset.{name}.{tokenizer}.{cluster}"]    - Dataset paths

# ============================================================================
# CLUSTER BASE CONFIGURATION
# ============================================================================
# Configure paths for each HPC cluster you use

["cluster.local"]
output_dir = "/home/joerg/workspace/python/github/titan-oellm/experiments/local_test"
cache_base = "/home/joerg/workspace/data/cache"
hf_datasets_cache = "/home/joerg/workspace/data/cache/hf"
hf_home = "/home/joerg/workspace/data/huggingface/cache"

["cluster.juwels"]
output_dir = "/p/project1/projectnucleus/franke5/experiments/titan-oellm"
cache_base = "/p/scratch/projectnucleus/franke5/cache"
hf_datasets_cache = "/p/scratch/projectnucleus/franke5/cache/hf"
hf_home = "/p/project1/transfernetx/franke5/model/cache"


